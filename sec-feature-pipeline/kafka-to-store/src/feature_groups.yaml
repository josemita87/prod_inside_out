# Feature-group catalog for the kafka-to-store microservice.
# `name` defaults to the reference key; `version` is injected at load time from
# config.feature_group_version. See secform4strategy_clients.feature_store.load_feature_group_catalog.
bt4:
  primary_key: [key]
  event_time: date
bi4:
  primary_key: [key]
  event_time: date
  online_enabled: false
  stream: false
