[project]
name = "inside-out-clients"
version = "0.1.0"
description = "Pure infrastructure clients (Hopsworks, Kafka, Alpaca) shared across the Inside-Out microservices."
readme = "README.md"
authors = [{ name = "Josep Cubedo Macian", email = "josep.cubedo@cabsa.es" }]
# Permissive range: each consuming service resolves this package independently
# against its own interpreter (services span 3.10-3.12).
requires-python = ">=3.10,<4.0"
# No hard dependencies: every third-party SDK lives behind an extra so a service
# installs only the clients it imports. See [project.optional-dependencies].
dependencies = []

[project.optional-dependencies]
feature-store = ["hopsworks>=4.1,<5", "pyarrow>=18"]
broker = ["alpaca-trade-api>=3.2,<4"]
messaging = ["quixstreams>=3.1,<4", "confluent-kafka>=2.6,<3"]
edgar = ["requests>=2.32,<3", "pandas>=2.1"]
# Heavy browser-automation deps for EdgarClient.fetch_live_links, kept separate
# so services that only do HTTP GETs (e.g. the scraper) don't pull Selenium.
edgar-live = ["selenium>=4.28,<5", "beautifulsoup4>=4,<5"]
market-data = ["yfinance>=0.2.48,<0.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/inside_out_clients"]
